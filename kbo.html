<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KBO 선수 분석 · 2026 시즌</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.min.css');
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;600;700&display=swap');
:root{
  --bg:#F6F6F4;--surface:#FFFFFF;--surface2:#FAFAF9;
  --side:#15171C;--side2:#1D2026;--side-txt:#C7CBD4;--side-dim:#6E7480;
  --line:#EAEAE6;--line2:#DEDED9;
  --ink:#181A1F;--muted:#6F747E;--dim:#A4A8B0;
  --accent:#13A06A;--accent-d:#0d7a50;--accent-soft:#E6F5EE;
  --pos:#13A06A;--neg:#DD5340;--blue:#3268C4;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:'Pretendard','Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;-webkit-font-smoothing:antialiased;font-size:15px;line-height:1.45}
.mono{font-family:'JetBrains Mono',monospace;font-variant-numeric:tabular-nums}

/* ===== app shell ===== */
.app{display:flex;min-height:100vh}
.sidebar{width:248px;flex:none;background:var(--side);color:var(--side-txt);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;padding:26px 18px}
.s-brand{font-size:21px;font-weight:800;letter-spacing:-.4px;color:#fff;padding:0 8px;display:flex;align-items:center;gap:9px}
.s-brand .logo{width:26px;height:26px;border-radius:7px;background:var(--accent);display:grid;place-items:center;color:#fff;font-weight:800;font-size:14px}
.s-brand b{color:var(--accent)}
.s-sub{font-size:11px;color:var(--side-dim);padding:8px 8px 0;letter-spacing:.01em;line-height:1.5}
.tabs{display:flex;flex-direction:column;gap:3px;margin-top:30px}
.tabs button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:none;border:none;color:var(--side-txt);padding:11px 12px;border-radius:9px;font-family:inherit;font-size:14.5px;font-weight:600;cursor:pointer;transition:.13s;letter-spacing:-.1px}
.tabs button .ic{width:8px;height:8px;border-radius:50%;background:var(--side-dim);flex:none;transition:.13s}
.tabs button:hover{background:var(--side2);color:#fff}
.tabs button.on{background:var(--accent);color:#fff}
.tabs button.on .ic{background:#fff}
.s-foot{margin-top:auto;font-size:10.5px;color:var(--side-dim);padding:14px 8px 0;border-top:1px solid #262A31;line-height:1.6;letter-spacing:.01em}
.content{flex:1;min-width:0;max-width:1080px;padding:34px 40px}

/* ===== controls ===== */
.toolbar{margin-bottom:6px}
.searchwrap{position:relative;max-width:480px}
#search{width:100%;background:var(--surface);border:1px solid var(--line2);border-radius:11px;color:var(--ink);padding:12px 14px 12px 40px;font-size:15px;font-family:inherit}
#search::placeholder{color:var(--dim)}
#search:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.searchwrap::before{content:"⌕";position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:18px}
.teambar{display:flex;gap:7px;flex-wrap:wrap;margin-top:14px}
.tchip{border:1px solid var(--line2);background:var(--surface);color:var(--muted);padding:8px 14px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:7px;transition:.12s}
.tchip:hover{border-color:var(--accent);color:var(--ink)}
.tchip.on{color:#fff;border-color:transparent}
.tchip .dot{width:8px;height:8px;border-radius:50%;flex:none}

/* ===== roster ===== */
.teamsec{margin-top:30px}
.teamhead{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:800;letter-spacing:-.3px}
.teamhead .bar{width:11px;height:11px;border-radius:50%}
.teamhead small{font-size:12px;color:var(--dim);font-weight:600;letter-spacing:0}
.posrow{margin-top:18px}
.poslabel{font-size:11px;letter-spacing:.09em;color:var(--muted);text-transform:uppercase;font-weight:700;margin-bottom:11px;display:flex;align-items:center;gap:7px}
.poslabel span{color:var(--dim)}
.roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:10px}
.pcard{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:14px 15px;cursor:pointer;transition:.13s;position:relative}
.pcard:hover{border-color:var(--accent);background:var(--surface2)}
.pcard.sel{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.pcard.nostat{background:var(--surface2)}
.pcard .chip{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.02em;padding:2px 8px;border-radius:5px;color:#fff}
.pcard .lv{position:absolute;top:14px;right:13px;font-size:9px;font-weight:700;color:var(--blue);border:1px solid var(--blue);border-radius:5px;padding:1px 6px}
.pcard .pn{font-size:17px;font-weight:700;margin-top:10px;letter-spacing:-.3px}
.pcard .meta{margin-top:5px;font-size:11.5px;color:var(--muted);font-weight:500}
.pcard .stat{margin-top:7px;display:flex;align-items:baseline;gap:6px}
.pcard .stat b{font-family:'JetBrains Mono';font-weight:700;font-size:19px;color:var(--ink)}
.pcard .stat span{font-size:10px;color:var(--dim);font-weight:600;letter-spacing:.04em;text-transform:uppercase}

/* ===== section labels ===== */
.sectlabel{font-size:11px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;font-weight:700;display:flex;align-items:center;gap:9px;margin:30px 0 14px}
.sectlabel::before{content:"";width:14px;height:2px;background:var(--accent);border-radius:2px}
.report{margin-top:8px}

/* ===== hero (detail header) ===== */
.hero{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:28px 30px}
.hero .toprow{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.hero .chip,.hero .bigchip{font-size:11px;font-weight:700;letter-spacing:.03em;padding:3px 11px;border-radius:6px;color:#fff}
.hero .role{font-size:12.5px;letter-spacing:.01em;color:var(--muted);font-weight:500}
.hero .hname{font-size:clamp(34px,7vw,50px);font-weight:800;letter-spacing:-1.2px;line-height:1.05;margin:14px 0 2px;color:var(--ink)}
.hero .headstats{display:flex;gap:0;flex-wrap:wrap;margin-top:22px;border-top:1px solid var(--line);padding-top:20px}
.hs{padding-right:34px;margin-right:34px;border-right:1px solid var(--line)}
.hs:last-child{border-right:none;margin-right:0;padding-right:0}
.hs .hv{font-family:'JetBrains Mono';font-weight:700;font-size:30px;color:var(--ink);line-height:1}
.hs .hl{font-size:10.5px;letter-spacing:.07em;color:var(--muted);margin-top:7px;text-transform:uppercase;font-weight:600}

/* ===== tables ===== */
table.stat{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden}
table.stat th,table.stat td{padding:12px 9px;text-align:center;border-bottom:1px solid var(--line)}
table.stat th{font-size:10.5px;color:var(--muted);background:var(--surface2);text-transform:uppercase;font-weight:700;letter-spacing:.04em}
table.stat td{font-family:'JetBrains Mono';font-weight:500;font-size:15px;color:var(--ink)}
table.stat tr:last-child td{border-bottom:none}
table.stat td.lead{color:var(--accent);font-weight:700}
.est{color:var(--blue)}
.note{font-size:11.5px;color:var(--dim);margin-top:9px;line-height:1.6}
.note b{color:var(--muted)}

/* ===== meters ===== */
.meters{display:grid;grid-template-columns:1fr 1fr;gap:16px 32px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:22px 26px}
.meter .mtop{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px}
.meter .mname{font-size:12px;color:var(--muted);font-weight:600}
.meter .mval{font-family:'JetBrains Mono';font-weight:700;font-size:14px;color:var(--ink)}
.track{height:6px;background:var(--line);border-radius:6px;overflow:hidden}
.fill{height:100%;border-radius:6px;background:var(--accent)}
.pct{font-size:10px;color:var(--dim);margin-top:5px;letter-spacing:.01em;font-weight:500}

/* ===== analysis ===== */
.acards{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.acard{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:22px 24px}
.acard h3{font-size:12px;letter-spacing:.05em;text-transform:uppercase;font-weight:700;margin-bottom:15px;display:flex;align-items:center;gap:8px}
.acard h3::before{content:"";width:8px;height:8px;border-radius:50%}
.acard.good h3{color:var(--pos)}.acard.good h3::before{background:var(--pos)}
.acard.bad h3{color:var(--neg)}.acard.bad h3::before{background:var(--neg)}
.acard ul{list-style:none}
.acard li{font-size:14px;line-height:1.55;padding:10px 0;border-bottom:1px solid var(--line)}
.acard li:last-child{border-bottom:none}
.acard li b{font-family:'JetBrains Mono';color:var(--ink);font-weight:600}
.acard .none{color:var(--dim);font-size:13px;padding:4px 0}
.summary{background:var(--accent-soft);border:1px solid #CDE9DC;border-radius:13px;padding:22px 26px}
.summary .q{display:none}
.summary p{font-size:16px;line-height:1.6;color:#0f5f40;font-weight:500}
.infobox{background:var(--surface2);border:1px solid var(--line2);border-radius:12px;padding:18px 22px;color:var(--muted);font-size:13.5px;line-height:1.7}
.infobox b{color:var(--ink)}

/* ===== matchup ===== */
.mu-pick{display:grid;grid-template-columns:1fr auto 1fr;gap:18px;align-items:end;margin-top:16px}
.mu-pick .col{display:flex;flex-direction:column;gap:8px}
.mu-pick label{font-size:11px;letter-spacing:.06em;text-transform:uppercase;font-weight:700}
.mu-pick .lb{color:var(--pos)}.mu-pick .lp{color:var(--blue)}
.mu-pick select{background:var(--surface);border:1px solid var(--line2);color:var(--ink);padding:13px 14px;border-radius:11px;font-family:inherit;font-size:15px;font-weight:600}
.mu-pick select:focus{outline:none;border-color:var(--accent)}
.vs{font-size:13px;color:var(--dim);font-weight:700;padding-bottom:14px;letter-spacing:.05em}
.mu-cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:22px}
.mu-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:20px 22px}
.mu-card.bat{border-top:3px solid var(--pos)}
.mu-card.pit{border-top:3px solid var(--blue)}
.mu-card .nm{font-size:23px;font-weight:800;letter-spacing:-.5px}
.mu-card .tm{font-size:11px;color:var(--muted);letter-spacing:.03em;font-weight:600;text-transform:uppercase}
.mu-line{display:flex;justify-content:space-between;font-size:13.5px;padding:9px 0;border-bottom:1px solid var(--line)}
.mu-line:last-child{border-bottom:none}
.mu-line span{color:var(--muted)}.mu-line b{font-family:'JetBrains Mono';color:var(--ink);font-weight:600}
.verdict{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:24px 26px;margin-top:16px}
.verdict h4{font-size:11px;color:var(--muted);letter-spacing:.06em;margin-bottom:10px;text-transform:uppercase;font-weight:700}
.verdict p{font-size:14.5px;line-height:1.62;margin-bottom:13px}.verdict p:last-child{margin-bottom:0}
.gauge{height:30px;border-radius:8px;background:linear-gradient(90deg,var(--pos),var(--pos) var(--g,50%),var(--blue) var(--g,50%),var(--blue));display:flex;align-items:center;justify-content:space-between;padding:0 16px;font-size:12px;color:#fff;font-weight:700}

/* ===== standings ===== */
table.rank{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden;font-size:14px}
table.rank th,table.rank td{padding:13px 8px;text-align:center;border-bottom:1px solid var(--line)}
table.rank th{font-size:10.5px;color:var(--muted);background:var(--surface2);letter-spacing:.04em;font-weight:700;text-transform:uppercase}
table.rank td{font-family:'JetBrains Mono';font-weight:500;color:var(--ink)}
table.rank tr:last-child td{border-bottom:none}
table.rank td.tn{font-family:'Pretendard';font-weight:700;text-align:left;padding-left:16px;display:flex;align-items:center;gap:9px;font-size:14.5px}
table.rank td.tn .dot{width:10px;height:10px;border-radius:50%}
table.rank tr.clickable{cursor:pointer}
table.rank tr.clickable:hover td{background:var(--surface2)}
.rk{font-weight:700;color:var(--muted)}
.last10 .w{color:var(--pos)}.last10 .l{color:var(--neg)}

.h2hbox{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:20px 22px;margin-top:14px}
.h2hbox>div:first-child{font-weight:800;font-size:17px;letter-spacing:-.3px}
.h2hgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:9px;margin-top:14px}
.h2hcell{background:var(--surface2);border:1px solid var(--line);border-radius:10px;padding:12px;text-align:center}
.h2hcell .op{font-size:11px;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:5px;margin-bottom:6px;font-weight:600}
.h2hcell .op .dot{width:7px;height:7px;border-radius:50%}
.h2hcell .rec{font-family:'JetBrains Mono';font-weight:700;font-size:16px}
.h2hcell.win .rec{color:var(--pos)}.h2hcell.lose .rec{color:var(--neg)}.h2hcell.even .rec{color:var(--muted)}

.cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:14px}
.regbox{background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:20px 22px}
.regbox h4{font-size:12px;letter-spacing:.05em;text-transform:uppercase;font-weight:700;margin-bottom:13px}
.regbox.up h4{color:var(--pos)}.regbox.down h4{color:var(--neg)}
.regbox ul{list-style:none}
.regbox li{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
.regbox li:last-child{border-bottom:none}
.regbox li .nm{font-weight:700}
.regbox li .pos{font-size:10px;color:var(--muted);border:1px solid var(--line2);border-radius:999px;padding:1px 8px;font-weight:600}
.regbox li .tm{font-size:11px;color:var(--dim);margin-left:auto;font-weight:600}
.regbox li .dot{width:9px;height:9px;border-radius:50%}

.empty{text-align:center;color:var(--dim);padding:70px 20px;font-size:15px;line-height:1.6}
.empty .big{font-size:24px;font-weight:800;color:var(--line2);margin-bottom:10px;letter-spacing:-.5px}
.btn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:11px 22px;font-weight:700;letter-spacing:.02em;font-size:14px;cursor:pointer}

@media(max-width:860px){
 .app{flex-direction:column}
 .sidebar{width:100%;height:auto;position:sticky;top:0;z-index:60;flex-direction:row;align-items:center;padding:12px 16px;gap:14px;flex-wrap:wrap}
 .s-brand{font-size:18px}.s-sub,.s-foot{display:none}
 .tabs{flex-direction:row;margin-top:0;margin-left:auto;gap:4px}
 .tabs button{padding:9px 13px;font-size:13.5px}
 .tabs button .ic{display:none}
 .content{padding:24px 18px;max-width:none}
 .acards,.meters,.mu-cards,.cols{grid-template-columns:1fr}
 .mu-pick{grid-template-columns:1fr}.vs{padding:0;text-align:center}
 .hs{padding-right:20px;margin-right:20px}
 table.stat{display:block;overflow-x:auto;white-space:nowrap}
}


/* ===== player table (clean list) ===== */
.ptable{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-top:12px}
.ptable tr.prow{cursor:pointer;transition:.1s}
.ptable tr.prow:hover td{background:var(--surface2)}
.ptable tr.prow.sel td{background:var(--accent-soft)}
.ptable td{padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
.ptable tr:last-child td{border-bottom:none}
.c-pos{width:72px}
.ptag{display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.02em;color:var(--muted);background:var(--surface2);border:1px solid var(--line2);border-radius:999px;padding:3px 9px}
.c-name{font-weight:700;font-size:14.5px;letter-spacing:-.2px}
.c-name .tdot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;vertical-align:middle}
.c-name .num{font-family:'JetBrains Mono';font-size:12px;color:var(--dim);font-weight:600;margin-left:7px}
.c-name .lv2{font-size:9px;font-weight:700;color:var(--blue);border:1px solid var(--blue);border-radius:5px;padding:1px 5px;margin-left:7px;vertical-align:middle}
.c-team{width:54px;color:var(--muted);font-size:12px;font-weight:600;text-align:right}
.c-stat{text-align:right;width:110px;white-space:nowrap}
.c-stat b{font-family:'JetBrains Mono';font-weight:700;font-size:15px;color:var(--ink)}
.c-stat span{font-size:10px;color:var(--dim);font-weight:600;text-transform:uppercase;margin-left:5px;letter-spacing:.03em}
.c-stat.empty{color:var(--dim);font-size:12px;font-weight:500}
.teamsec .teamhead small{margin-left:2px}
@media(max-width:860px){.ptable td{padding:11px 10px}.c-pos{width:auto}.ptag{font-size:10px;padding:2px 7px}}


/* grouped position subheader + inline expand */
.grp td{background:var(--surface2);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700;padding:9px 14px}
.grp td span{color:var(--dim);margin-left:5px}
.rpos{font-size:11px;color:var(--muted);font-weight:500;margin-left:8px}
.prow.open td{background:var(--accent-soft)}
.detailrow>td{padding:0;background:var(--surface2)}
.inlinereport{padding:18px 18px 24px;border-left:3px solid var(--accent)}
.inlinereport .hero{padding:22px 24px}
.inlinereport .sectlabel:first-child{margin-top:2px}


/* favorite team */
.myteam{display:flex;justify-content:space-between;align-items:center;gap:16px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px 22px;margin-bottom:22px;flex-wrap:wrap}
.myteam.empty{display:block;color:var(--muted);font-size:13.5px;background:var(--surface2);border-style:dashed;border-color:var(--line2)}
.myteam.empty b{color:var(--accent)}
.mt-tag{font-size:11px;font-weight:700;letter-spacing:.06em;color:#E0A52E;text-transform:uppercase}
.mt-name{font-size:25px;font-weight:800;letter-spacing:-.6px;margin-top:4px}
.mt-sub{font-size:12.5px;color:var(--muted);margin-top:6px}
.mt-right{display:flex;align-items:center;gap:26px}
.mt-stat{text-align:center}
.mt-stat b{font-family:'JetBrains Mono';font-weight:700;font-size:22px;display:block;color:var(--ink);line-height:1.1}
.mt-stat span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.mt-stat.last10{font-family:'JetBrains Mono';font-weight:700;font-size:14px;text-align:center}
.mt-clear{background:none;border:1px solid var(--line2);color:var(--muted);border-radius:9px;padding:9px 13px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.mt-clear:hover{border-color:var(--neg);color:var(--neg)}
.tchip .tlabel{display:flex;align-items:center;gap:7px}
.tchip .star{cursor:pointer;font-size:14px;color:var(--dim);line-height:1;margin-left:2px}
.tchip .star.on{color:#E0A52E}
.tchip.fav{border-color:#E0A52E}
.tchip.on .star.on{color:#fff}
.favstar{color:#E0A52E}
.favrow td{background:var(--accent-soft) !important}
@media(max-width:860px){.myteam{flex-direction:column;align-items:flex-start}.mt-right{width:100%;justify-content:space-between;gap:14px}}


/* team analysis panel */
.teampanel{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:24px 26px;margin-bottom:24px}
.tp-head{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:800;letter-spacing:-.4px}
.tp-head .tp-dot{width:13px;height:13px;border-radius:50%}
.tp-head .tp-sub{font-size:11px;color:var(--dim);font-weight:600;margin-left:auto;letter-spacing:.03em}
.tstatgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-top:18px}
.tstat{background:var(--surface);padding:14px 12px;text-align:center}
.tstat .tl{font-size:11px;color:var(--muted);font-weight:600}
.tstat .tv{font-family:'JetBrains Mono';font-weight:700;font-size:21px;margin-top:5px;color:var(--ink)}
.tstat .tr{font-size:10px;color:var(--accent);font-weight:700;margin-top:4px}
.tstat .tr.dim{color:var(--dim);font-weight:500}
.tp-sec{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;margin:22px 0 12px}
.trate{display:flex;flex-direction:column;gap:11px}
.trow{display:flex;align-items:center;gap:12px}
.trow .tlab{width:52px;font-size:13px;font-weight:700}

 if(p.bbk!=null&&p.bbk>=0.7)S.push(`안정적 선구안 — 볼넷/삼진 <b>${f2(p.bbk)}</b>.`);
 if(p.iso<=.110)W.push(`장타력 부족 — ISO <b>${f3(p.iso)}</b>, 단타 위주입니다.`);
 if(p.bbk!=null&&p.bbk<=0.45)W.push(`삼진 비중 높음 — BB/K <b>${f2(p.bbk)}</b>, 출루 안정성 개선 여지.`);
 if(p.hr<=4)W.push(`홈런 적음 — <b>${p.hr}개</b>, 장타 임팩트 제한적.`);
 if(p.avg<.290&&p.ops!=null&&p.ops<.780)W.push(`생산력 평균권 — 타율 <b>${f3(p.avg)}</b>·OPS <b>${f3(p.ops)}</b>(추정).`);
 return{S,W};}

function meters(p){const isH=p.kind==="H";
 const defs=isH?[["타율","avg",f3,1],["OPS(추정)","ops",f3,1],["ISO","iso",f3,1],["홈런","hr",x=>x,1],["타점","rbi",x=>x,1],["볼넷/삼진","bbk",f2,1]]
                :[["ERA","era",f2,0],["WHIP","whip",f2,0],["K/9","k9",f1,1],["BB/9","bb9",f1,0],["이닝","ip",x=>x.toFixed(0),1],["K/BB","kbb",f2,1]];

function bindStars(){document.querySelectorAll(".pstar").forEach(s=>s.onclick=e=>{e.stopPropagation();const p=ALL.find(x=>x.id==s.dataset.fav);const on=toggleFavP(p);s.classList.toggle("on",on);const c=document.querySelector('.favcount');if(c)c.textContent=favP.size;if(team==="FAV"&&!on){const row=s.closest("tr");const det=row.nextElementSibling;if(det&&det.classList.contains("detailrow"))det.remove();row.remove();}});}
function rankOf(key,t,hi){const vals=TORDER.map(x=>TEAMSTAT[x][key]);const sorted=[...vals].sort((a,b)=>hi?b-a:a-b);return sorted.indexOf(TEAMSTAT[t][key])+1;}
function starVal(rank){return (11-rank)/2;}
function starbar(v){const pct=Math.max(0,Math.min(100,v/5*100));return `<span class="stars"><span class="sempty">★★★★★</span><span class="sfill" style="width:${pct}%">★★★★★</span></span>`;}
function teamComment(t){const d=TEAMSTAT[t],T=TEAM[t],P=[];
 const ro=rankOf('ops',t,true),rh=rankOf('hr',t,true),rf=rankOf('fpct',t,true);
 if(d.ops>=LGAVG.ops)P.push(`OPS ${f3(d.ops)}로 리그 평균(${f3(LGAVG.ops)})을 웃도는 ${ro<=3?'정상급':'상위권'} 공격력`);
 else P.push(`OPS ${f3(d.ops)}로 리그 평균(${f3(LGAVG.ops)})을 밑도는 공격력`);
 if(rh<=2)P.push(`팀 홈런 ${d.hr}개로 리그 ${rh}위의 장타력`);
 if(d.era<=LGAVG.era-0.3)P.push(`평균자책점 ${f2(d.era)}로 안정적인 마운드`);
 else if(d.era>=LGAVG.era+0.3)P.push(`평균자책점 ${f2(d.era)}로 투수력 보강이 과제`);
 if(rf<=3)P.push(`수비율 ${f3(d.fpct)}로 탄탄한 수비`);
 const diff=d.R-d.RA;
 const tail=diff>40?`득실 마진 +${diff}로 전력이 탄탄합니다`:(diff<-40?`득실 마진 ${diff}로 전력 보강이 필요합니다`:`득실 마진 ${diff>=0?'+':''}${diff}의 균형형 전력입니다`);
 return `<b>${T.name}</b>은(는) `+P.slice(0,3).join(', ')+`. ${tail}.`;
}
function teamPanel(t){const d=TEAMSTAT[t],T=TEAM[t];
 const cell=(l,v,rank)=>`<div class="tstat"><div class="tl">${l}</div><div class="tv">${v}</div>${rank?`<div class="tr">리그 ${rank}위</div>`:`<div class="tr dim">공식 미제공</div>`}</div>`;
 const stats=`<div class="tstatgrid">${cell('팀 타율',f3(d.avg),rankOf('avg',t,true))}${cell('팀 OPS',f3(d.ops),rankOf('ops',t,true))}${cell('팀 홈런',d.hr,rankOf('hr',t,true))}${cell('팀 ERA',f2(d.era),rankOf('era',t,false))}${cell('팀 WHIP',f2(d.whip),rankOf('whip',t,false))}${cell('팀 WAR','—',null)}${cell('득점',d.R,rankOf('R',t,true))}${cell('실점',d.RA,rankOf('RA',t,false))}</div>`;
 const R=[['공격력',starVal(rankOf('ops',t,true)),'OPS'],['수비력',starVal(rankOf('fpct',t,true)),'수비율'],['선발',starVal(rankOf('era',t,false)),'팀 ERA'],['불펜',starVal(rankOf('svhld',t,true)),'세이브+홀드']];
 const rate=`<div class="trate">`+R.map(([l,v,b])=>`<div class="trow"><span class="tlab">${l}</span>${starbar(v)}<span class="tbasis">${b} 기준</span></div>`).join("")+`</div>`;
 return `<div class="teampanel" style="border-top:4px solid ${T.c}"><div class="tp-head">${logo(t,32)}${T.name} 팀 분석<span class="tp-sub">2026 · 약 75경기</span></div>${stats}<div class="tp-sec">팀 역량 (10개 구단 상대 순위)</div>${rate}<div class="tp-sec">AI 코멘트</div><div class="tp-ai">${teamComment(t)}</div><div class="note">평가 기준 — 공격력=OPS · 수비력=수비율 · 선발=팀 ERA · 불펜=세이브+홀드의 리그 순위. 선발/불펜 개별 ERA와 팀 WAR은 공식 일괄 제공이 없어 근사·생략했습니다.</div></div>`;
}

function rowHTML(p,showTeam,xcls){

 const tdot=showTeam?`<span class="tdot" style="background:${(TEAM[p.t]||{c:'#999'}).c}"></span>`:"";

 const rpos=showTeam?`<span class="rpos">${POSN[p.pos]}</span>`:"";
 const lv2=p.level==="2군"?`<span class="lv2">2군</span>`:"";
 let stat;
 if(p.hasStats){const L=p.kind==="H"?[f3(p.avg),"AVG"]:[f2(p.era),"ERA"];stat=`<td class="c-stat"><b>${L[0]}</b><span>${L[1]}</span></td>`;}
 else stat=`<td class="c-stat empty">기록 없음</td>`;
 const teamCol=showTeam?`<td class="c-team">${p.t}</td>`:"";
 return `<tr class="prow ${sel} ${xcls||''}" data-id="${p.id}"><td class="c-name">${tdot}${p.n}${num}${rpos}${lv2}</td>${teamCol}${stat}<td class="c-fav"><span class="pstar ${favP.has(pkey(p))?'on':''}" data-fav="${p.id}" title="즐겨찾기">★</span></td></tr>`;

function openRow(r){
 const p=ALL.find(x=>x.id==r.dataset.id);
 const wasOpen=r.classList.contains("open");
 document.querySelectorAll(".prow.open").forEach(x=>x.classList.remove("open","sel"));
 document.querySelectorAll(".detailrow").forEach(x=>x.remove());
 if(wasOpen){selected=null;return;}
 r.classList.add("open","sel");selected=p;
 const cols=r.children.length;
 const tr=document.createElement("tr");tr.className="detailrow";
 tr.innerHTML=`<td colspan="${cols}"><div class="inlinereport">${reportHTML(p)}</div></td>`;
 r.parentNode.insertBefore(tr,r.nextSibling);
 tr.scrollIntoView({behavior:"smooth",block:"nearest"});
}

function teamSection(t,players,isFav){
 if(!players.length)return"";
 const T=TEAM[t];const withS=players.filter(p=>p.hasStats),no=players.filter(p=>!p.hasStats);
 const tid="more"+TORDER.indexOf(t);let rows="";
 for(const[code,label] of POS){const arr=withS.filter(p=>p.pos===code);if(!arr.length)continue;
  rows+=`<tr class="grp"><td colspan="3">${label} <span>${arr.length}</span></td></tr>`+arr.map(p=>rowHTML(p,false,"")).join("");}
 if(!withS.length)rows+=`<tr class="grp"><td colspan="3">기록 보유 선수 없음</td></tr>`;
 if(no.length){
  rows+=`<tr class="moretoggle" data-more="${tid}"><td colspan="3"><span class="mt-ic">▾</span>기록 미보유 선수 ${no.length}명 더보기</td></tr>`;
  for(const[code,label] of POS){const arr=no.filter(p=>p.pos===code);if(!arr.length)continue;
   rows+=`<tr class="grp more ${tid}"><td colspan="3">${label} <span>${arr.length}</span></td></tr>`+arr.map(p=>rowHTML(p,false,"more "+tid)).join("");}
 }
 const head=`<div class="teamhead">${logo(t,30)}${isFav?'<span class="favstar">★</span> ':''}${T.name}<small>${players.length}명 · 기록 ${withS.length}명</small></div>`;
 return `<div class="teamsec">${head}<table class="ptable"><tbody>${rows}</tbody></table></div>`;
}

 else b.innerHTML+=`<div class="note" style="margin-top:14px">※ 이 팀의 2군(퓨처스) 명단은 공식 사이트 구조상 일괄 수집이 불가해 미수록입니다.</div>`;
 bindRows();bindStars();bindMore();
}

function drawMatchup(){
 const b=HIT.find(p=>p.n===muBat),p=PIT.find(x=>x.n===muPit);
 const T1=TEAM[b.t],T2=TEAM[p.t];
 const batPr=pctRank(HIT.map(x=>x.ops),b.ops,true)??pctRank(HIT.map(x=>x.avg),b.avg,true);
 const pitPr=pctRank(PIT.map(x=>x.era),p.era,false);
 const total=batPr+pitPr; const batShare=total?Math.round(batPr/total*100):50;
 const fav = batShare>56?b.n+" 우세":(batShare<44?p.n+" 우세":"백중세");
 let reason;
 if(batShare>56) reason=`<b>${b.n}</b>의 시즌 생산력(OPS ${f3(b.ops)} 추정·ISO ${f3(b.iso)})이 <b>${p.n}</b>의 억제력(ERA ${f2(p.era)}·WHIP ${f2(p.whip)})을 상회합니다. 시즌 성적만 놓고 보면 타자 쪽에 무게가 실립니다.`;
 else if(batShare<44) reason=`<b>${p.n}</b>의 억제력(ERA ${f2(p.era)}·WHIP ${f2(p.whip)}·K/9 ${f1(p.k9)})이 <b>${b.n}</b>의 타격을 앞섭니다. 시즌 성적 기준 투수 쪽이 유리합니다.`;
 else reason=`두 선수의 시즌 지표 수준이 비슷해 결과를 한쪽으로 예단하기 어렵습니다(백중세).`;
 const kNote = (b.bbk!=null)? `타자 선구(BB/K ${f2(b.bbk)}) vs 투수 탈삼진(K/9 ${f1(p.k9)}) — `+(p.k9>=8.5?"투수의 삼진 능력이 높아 헛스윙 유도 가능성이 있습니다.":"투수 탈삼진이 평이해 타자가 컨택으로 대응할 여지가 있습니다.") : `투수 K/9 ${f1(p.k9)}.`;
 $("#report").innerHTML=`
  <div class="mu-cards">
   <div class="mu-card bat"><div class="tm">${T1.name}</div><div class="nm">${b.n}</div>
    <div style="margin-top:10px">
     <div class="mu-line"><span>타율</span><b>${f3(b.avg)}</b></div>
     <div class="mu-line"><span>OPS(추정)</span><b class="est">${f3(b.ops)}</b></div>
     <div class="mu-line"><span>ISO</span><b>${f3(b.iso)}</b></div>
     <div class="mu-line"><span>홈런 / 타점</span><b>${b.hr} / ${b.rbi}</b></div>
     <div class="mu-line"><span>볼넷/삼진</span><b>${b.bbk==null?"—":f2(b.bbk)}</b></div></div></div>
   <div class="mu-card pit"><div class="tm">${T2.name}</div><div class="nm">${p.n}</div>
    <div style="margin-top:10px">
     <div class="mu-line"><span>ERA</span><b>${f2(p.era)}</b></div>
     <div class="mu-line"><span>WHIP</span><b>${f2(p.whip)}</b></div>
     <div class="mu-line"><span>K/9</span><b>${f1(p.k9)}</b></div>
     <div class="mu-line"><span>BB/9</span><b>${f1(p.bb9)}</b></div>
     <div class="mu-line"><span>피홈런 / 이닝</span><b>${p.hr} / ${p.ipText}</b></div></div></div>
  </div>
  <div class="verdict">
   <h4>시즌 성적 기반 예상 우위</h4>
   <div class="gauge" style="--g:${batShare}%"><span>${b.n}</span><span>${p.n}</span></div>
   <p style="text-align:center;font-family:'Oswald';letter-spacing:.05em;color:var(--amber)">${fav} (${batShare} : ${100-batShare})</p>
   <p>${reason}</p>
   <p>${kNote}</p>
   <h4>주의</h4>
   <p>이 결과는 실제 타석별 상대전적(맞대결 타수·안타)이 아니라 <b>각 선수의 2026 시즌 전체 성적을 비교한 예측</b>입니다. 실제 맞대결 데이터(예: 타자 vs 투수 통산 12타수 4안타 1홈런)가 있으면 그 기록을 넣어 더 정확히 분석할 수 있습니다.</p>
  </div>`;
}

   <div class="regbox up"><h4>▲ 등록 (특별엔트리)</h4><ul>${REG_UP.map(([n,po,t])=>`<li>${dot(t)}<span class="nm">${n}</span><span class="pos">${po}</span><span class="tm">${t}</span></li>`).join("")}</ul></div>
   <div class="regbox down"><h4>▼ 말소</h4><ul>${REG_DN.map(([n,po,t])=>`<li>${dot(t)}<span class="nm">${n}</span><span class="pos">${po}</span><span class="tm">${t}</span></li>`).join("")}</ul></div>

 drawH2H();
 document.querySelectorAll("tr.clickable").forEach(r=>r.onclick=()=>{h2hTeam=r.dataset.t;drawH2H();$("#h2hbox").scrollIntoView({behavior:"smooth",block:"center"});});

function drawH2H(){
 const t=h2hTeam,row=H2H[t];
 $("#h2hbox").innerHTML=`<div style="font-family:'Black Han Sans';font-size:18px;display:flex;align-items:center;gap:8px">${logo(t,24)} ${TEAM[t].name} 상대전적</div>
  <div class="h2hgrid">${TORDER.filter(o=>o!==t).map(o=>{const rec=row[o];const c=recCls(rec);
   return `<div class="h2hcell ${c}"><div class="op">${dot(o)}${o}</div><div class="rec">${rec}</div></div>`;}).join("")}</div>
  <div class="note">표기는 승-패-무. <span style="color:var(--pos)">초록</span>=우세, <span style="color:var(--neg)">빨강</span>=열세 (2026.06.28 기준).</div>`;
}

/* ===================== tabs ===================== */
function setTab(t){tab=t;selected=null;
 document.querySelectorAll(".tabs button").forEach(b=>b.classList.toggle("on",b.dataset.tab===t));
 $("#report").innerHTML="";
 if(t==="players")renderPlayers();
 else if(t==="matchup")renderMatchup();
 else renderLeague();
}
